name: Terraform-Plan

on:
  pull_request:
    branches: [main]
    paths:
      #- "user_management/**"
      - "ec2/**"
      - "vpc/**"
      - ".github/workflows/terraform-plan.yml"
  # Can also be triggered manually from the Actions tab.
  workflow_dispatch:
    inputs:
      directory:
        description: "Which Terraform root to plan"
        required: true
        type: choice
        options:
          - ec2
          - vpc
          # - user_management

# Required for GitHub OIDC -> AWS role assumption
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.5"
  AWS_REGION: "ap-south-1"

jobs:
  terraform:
    name: Validate & Plan (${{ matrix.dir }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Manual run: only the selected directory. PR: both directories.
        dir: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.directory)) || fromJSON('["ec2","vpc"]') }}
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -no-color

      - name: Add tick mark to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Terraform fmt, validate and plan passed for **${{ matrix.dir }}**.`
            });

